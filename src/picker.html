<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>guepardosys-snip — Picker</title>
    <link rel="icon" type="image/png" href="assets/guepardosys-snip-logo.png" />
    <link rel="stylesheet" href="styles/picker.css" />
    <script src="vendor/lucide.js"></script>
  </head>

  <body>
    <div class="picker">
      <!-- Search -->
      <div class="picker-search-wrapper">
        <img class="picker-brand-logo" src="assets/guepardosys-snip-logo.png" alt="" />
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          type="text"
          id="picker-search"
          class="picker-search"
          placeholder="Buscar snippet..."
          autocomplete="off"
          spellcheck="false"
          autofocus
        />
      </div>

      <!-- List -->
      <div id="picker-list" class="picker-list">
        <div class="picker-empty">Carregando...</div>
      </div>

      <!-- Footer hints -->
      <div class="picker-footer">
        <span><kbd>↑</kbd><kbd>↓</kbd> navegar</span>
        <span><kbd>⏎</kbd> selecionar</span>
        <span><kbd>Esc</kbd> fechar</span>
      </div>

      <div id="variable-overlay" class="variable-overlay" hidden>
        <form id="variable-form" class="variable-card">
          <h2>Preencha os campos</h2>
          <div id="variable-fields"></div>
          <div class="variable-actions">
            <button id="btn-cancel-variables" type="button">Cancelar</button>
            <button type="submit">Executar</button>
          </div>
        </form>
      </div>
    </div>

    <script src="scripts/picker.js"></script>
  </body>
</html>
